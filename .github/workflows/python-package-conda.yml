name: CI – Bellini Scheduling System

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build on Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat everything else as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Populate schedule database
        run: |
          python - <<'EOF'
          import pandas as pd, os
          from app.data_service import normalize_dataframe, DATA_FILE

          upload_dir = "uploads"
          files = [
              os.path.join(upload_dir, f)
              for f in os.listdir(upload_dir)
              if f.endswith(".xlsx")
          ]
          if files:
              dfs = [normalize_dataframe(pd.read_excel(f)) for f in files]
              combined = pd.concat(dfs, ignore_index=True)
              if "CRN" in combined.columns and "TERM" in combined.columns:
                  combined = combined.drop_duplicates(subset=["CRN", "TERM"], keep="last")
              os.makedirs(os.path.dirname(DATA_FILE), exist_ok=True)
              combined.to_csv(DATA_FILE, index=False)
              print(f"Imported {len(combined)} classes from {len(files)} file(s)")
          else:
              print("No Excel files found in uploads/")
          EOF

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

